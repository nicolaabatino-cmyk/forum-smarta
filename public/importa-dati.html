</head>

                { categoryId: "cat_inclusione", title: "Strategie didattiche per studenti BES e DSA", content: "Metodologie personalizzate per garantire il successo formativo.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_inclusione", title: "Gestione delle classi difficili nei laboratori/classi", content: "Consigli e supporto reciproco sulla gestione del comportamento.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_inclusione", title: "Condivisione di strumenti compensativi", content: "Raccolta di schemi, mappe e software facilitatori.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_inclusione", title: "Esperienze su PDP e PEI", content: "Aspetti burocratici e operativi della documentazione inclusiva.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_inclusione", title: "Motivazione e coinvolgimento degli studenti", content: "Come contrastare la dispersione e aumentare l'interesse.", author: "Amministratore", date: new Date().toISOString() },

                // 8. Progetti, Eventi e Concorsi
                { categoryId: "cat_progetti", title: "Proposte progettuali ed eventi", content: "In questo spazio possono essere proposte e condivise idee progettuali, partecipazioni a concorsi, eventi didattici e collaborazioni con enti esterni.\nLa discussione favorisce il coordinamento e la valorizzazione delle iniziative dell’istituto.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_progetti", title: "Proposte di nuovi progetti didattici", content: "Spazio per l'ideazione di nuove attività extra-curricolari.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_progetti", title: "Concorsi gastronomici e professionali", content: "Segnalazione di bandi e preparazione degli studenti alle competizioni.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_progetti", title: "Partecipazione a eventi del territorio", content: "Presenza dell'istituto a fiere, sagre e manifestazioni locali.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_progetti", title: "Collaborazioni con enti e associazioni", content: "Lavoro di rete con il tessuto sociale e culturale.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_progetti", title: "Documentazione e rendicontazione dei progetti", content: "Come archiviare e dare visibilità al lavoro svolto.", author: "Amministratore", date: new Date().toISOString() },

                { categoryId: "cat_innovazione", title: "Strumenti digitali e formazione", content: "Spazio dedicato all’innovazione didattica, agli strumenti digitali e alla formazione dei docenti.\nÈ possibile condividere risorse, applicazioni, esperienze formative e riflessioni sull’uso consapevole delle tecnologie nella didattica.", author: "Amministratore", date: new Date().toISOString() },

                { categoryId: "cat_confronto", title: "Confronto tra docenti", content: "Questo è uno spazio di confronto libero e costruttivo tra docenti.\nÈ possibile porre domande, condividere esperienze significative, proporre miglioramenti e favorire una comunità professionale collaborativa.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_confronto", title: "Buone Pratiche Didattiche da condividere", content: "Cosa ha funzionato in aula? Condividiamo il successo.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_confronto", title: "Esperienze significative in classe o in laboratorio", content: "Racconti di vita scolastica che stimolano la riflessione.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_confronto", title: "Domande, dubbi e richieste di confronto", content: "Nessuna domanda è banale se serve a migliorare.", author: "Amministratore", date: new Date().toISOString() },
                { categoryId: "cat_confronto", title: "Suggerimenti per migliorare il funzionamento dell’istituto", content: "Proposte costruttive per l'organizzazione scolastica.", author: "Amministratore", date: new Date().toISOString() }
            ]
        };

        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            if (!confirm("ATTENZIONE: Questa operatività cancellerà TUTTE le attuali categorie e discussioni. Vuoi procedere?")) return;

            btn.disabled = true;
            status.innerHTML = "Svuotamento database e importazione in corso... Attendi...";

            try {
                // Svuota database
                await db.ref('categories').remove();
                await db.ref('threads').remove();
                console.log("Database svuotato.");

                // Carica Categorie
                for (const cat of data.categories) {
                    await db.ref('categories/' + cat.id).set({ name: cat.name });
                    console.log("Categoria aggiunta:", cat.name);
                }

                // Carica Discussioni
                for (const thread of data.threads) {
                    await db.ref('threads').push(thread);
                    console.log("Discussione aggiunta:", thread.title);
                }

                status.innerHTML = "<span style='color: #10b981;'>Successo! Dati caricati correttamente.</span><br>Tutte le vecchie discussioni sono state rimosse e sostituite con le nuove.";
                status.innerHTML += "<br><br><b>Nota:</b> Torna al forum per vedere i cambiamenti.";
            } catch (error) {
                console.error(error);
                status.innerHTML = "<span style='color: #ef4444;'>Errore durante l'importazione. Controlla la console del browser.</span>";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
